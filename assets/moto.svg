<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360">
<defs>
  <style>
    .wr { animation: spin .9s linear infinite; transform-origin: 138px 272px; }
    .wf { animation: spin .9s linear infinite; transform-origin: 470px 272px; }
    .bg { animation: fl 2.6s ease-in-out infinite; }
    .hl { animation: hl 2s ease-in-out infinite; }
    .sl1 { animation: sl 1.1s 0s ease-out infinite; }
    .sl2 { animation: sl 1.1s .28s ease-out infinite; }
    .sl3 { animation: sl 1.1s .55s ease-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fl   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes hl   { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes sl   { 0%{opacity:0;transform:translateX(8px)} 35%{opacity:.75} 100%{opacity:0;transform:translateX(-55px)} }
  </style>
  <linearGradient id="body" x1="0%" y1="0%" x2="50%" y2="100%">
    <stop offset="0%"   stop-color="#2a2a2a"/>
    <stop offset="100%" stop-color="#111111"/>
  </linearGradient>
  <linearGradient id="body2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#252525"/>
    <stop offset="100%" stop-color="#111111"/>
  </linearGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Ground shadow -->
<ellipse cx="304" cy="338" rx="238" ry="11" fill="rgba(0,0,0,0.45)"/>

<!-- Speed lines -->
<g class="sl1"><line x1="12" y1="228" x2="84"  y2="228" stroke="#fd6814" stroke-width="2.8" stroke-linecap="round"/></g>
<g class="sl2"><line x1="5"  y1="248" x2="75"  y2="248" stroke="#fd6814" stroke-width="1.9" stroke-linecap="round"/></g>
<g class="sl3"><line x1="18" y1="264" x2="78"  y2="264" stroke="#fd6814" stroke-width="1.3" stroke-linecap="round"/></g>

<g class="bg">

  <!-- REAR WHEEL (fat tire) -->
  <circle cx="138" cy="272" r="63" fill="#090909"/>
  <circle cx="138" cy="272" r="56" fill="#0f0f0f"/>
  <circle cx="138" cy="272" r="46" fill="#1a1a1a"/>
  <g class="wr" stroke="#2e2e2e" stroke-width="5" stroke-linecap="round">
    <line x1="138" y1="226" x2="138" y2="318"/>
    <line x1="93"  y1="246" x2="183" y2="298"/>
    <line x1="93"  y1="298" x2="183" y2="246"/>
    <line x1="110" y1="222" x2="166" y2="322"/>
    <line x1="166" y1="222" x2="110" y2="322"/>
  </g>
  <circle cx="138" cy="272" r="18" fill="#222"/>
  <circle cx="138" cy="272" r="11" fill="#fd6814"/>
  <circle cx="138" cy="272" r="5"  fill="#111"/>

  <!-- FRONT WHEEL (fat tire + disc brake) -->
  <circle cx="470" cy="272" r="63" fill="#090909"/>
  <circle cx="470" cy="272" r="56" fill="#0f0f0f"/>
  <circle cx="470" cy="272" r="46" fill="#1a1a1a"/>
  <g class="wf" stroke="#2c2c2c" stroke-width="3.5" stroke-linecap="round">
    <line x1="470" y1="226" x2="470" y2="318"/>
    <line x1="424" y1="249" x2="516" y2="295"/>
    <line x1="424" y1="295" x2="516" y2="249"/>
    <line x1="426" y1="272" x2="514" y2="272"/>
    <line x1="437" y1="228" x2="503" y2="316"/>
    <line x1="503" y1="228" x2="437" y2="316"/>
  </g>
  <circle cx="470" cy="272" r="36" fill="none" stroke="#404040" stroke-width="5" stroke-dasharray="9 4"/>
  <rect x="494" y="294" width="17" height="12" rx="3" fill="#383838"/>
  <rect x="496" y="296" width="13" height="8"  rx="2" fill="#2a2a2a"/>
  <circle cx="470" cy="272" r="15" fill="#222"/>
  <circle cx="470" cy="272" r="8"  fill="#2e2e2e"/>
  <circle cx="470" cy="272" r="3.5" fill="#fd6814"/>

  <!-- MAIN LOWER BODY (chunky storage block) -->
  <path d="M 112,270 C 108,252 112,232 122,220 L 160,208 L 370,208 C 382,208 394,218 397,232 L 400,270 Z"
        fill="url(#body)"/>
  <path d="M 124,220 L 370,212" fill="none" stroke="#303030" stroke-width="1"/>

  <!-- ORANGE ACCENT STRIPES on lower body -->
  <path d="M 124,222 L 370,215 L 374,227 L 124,234 Z" fill="#fd6814" opacity="0.92"/>
  <path d="M 130,237 L 368,231 L 370,236 L 130,242 Z" fill="#fd6814" opacity="0.32"/>

  <!-- UPPER SEAT PANEL -->
  <path d="M 160,208 C 158,192 162,178 170,170 L 318,166 C 328,164 336,170 338,182 L 340,208 Z"
        fill="url(#body)"/>
  <path d="M 165,170 L 318,167" fill="none" stroke="#2e2e2e" stroke-width="1"/>

  <!-- SEAT CUSHION (two-person) -->
  <path d="M 162,170 C 160,158 164,148 174,145 L 316,143 C 326,141 334,148 336,158 L 338,170 Z"
        fill="#1e1e1e"/>
  <path d="M 165,163 C 163,155 167,148 174,147 L 315,145 C 323,143 330,149 331,157 L 333,165 Z"
        fill="#282828"/>
  <line x1="248" y1="148" x2="248" y2="168" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 175,155 L 245,153" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5 3"/>
  <path d="M 252,153 L 330,151" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- PASSENGER BACKREST -->
  <rect x="326" y="116" width="22" height="34" rx="6" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="329" y="119" width="16" height="28" rx="4" fill="#252525"/>
  <line x1="329" y1="126" x2="345" y2="126" stroke="#2e2e2e" stroke-width="1.2"/>
  <line x1="329" y1="133" x2="345" y2="133" stroke="#2e2e2e" stroke-width="1.2"/>
  <line x1="329" y1="140" x2="345" y2="140" stroke="#2e2e2e" stroke-width="1.2"/>

  <!-- REAR STORAGE BOX -->
  <path d="M 332,168 L 404,162 L 408,215 L 338,218 Z" fill="#1c1c1c"/>
  <path d="M 335,170 L 400,164 L 400,178 L 335,183 Z" fill="#222"/>
  <rect x="340" y="183" width="54" height="28" rx="3" fill="#1a1a1a" stroke="#272727" stroke-width="1"/>
  <rect x="360" y="191" width="16" height="10" rx="2" fill="#212121" stroke="#2e2e2e" stroke-width="1"/>
  <circle cx="368" cy="196" r="3" fill="#2a2a2a" stroke="#383838" stroke-width="1"/>

  <!-- FRONT BODY CONNECTION (rear box to leg shield) -->
  <path d="M 370,208 C 384,200 398,185 412,170 L 434,158 C 446,153 458,158 464,170 L 468,215 L 400,218 Z"
        fill="url(#body2)"/>
  <path d="M 377,200 L 460,178 L 464,189 L 378,210 Z" fill="#fd6814" opacity="0.88"/>
  <path d="M 380,212 L 462,192 L 463,196 L 381,216 Z" fill="#fd6814" opacity="0.3"/>

  <!-- LEG SHIELD (front lower) -->
  <path d="M 395,216 C 395,235 396,252 398,270 L 470,270 C 468,252 462,235 456,220 L 440,215 Z"
        fill="#1b1b1b"/>
  <path d="M 400,230 L 454,226" fill="none" stroke="#272727" stroke-width="1"/>

  <!-- FOOTBOARD PLATFORM -->
  <rect x="195" y="270" width="198" height="16" rx="5" fill="#181818"/>
  <rect x="200" y="272" width="188" height="10" rx="3" fill="#202020"/>
  <line x1="220" y1="272" x2="220" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="240" y1="272" x2="240" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="260" y1="272" x2="260" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="280" y1="272" x2="280" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="300" y1="272" x2="300" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="320" y1="272" x2="320" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="340" y1="272" x2="340" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="360" y1="272" x2="360" y2="282" stroke="#252525" stroke-width="1.5"/>
  <line x1="380" y1="272" x2="380" y2="282" stroke="#252525" stroke-width="1.5"/>

  <!-- REAR FENDER -->
  <path d="M 84,270 C 80,255 80,238 85,222 L 94,214 C 100,210 114,210 122,218 C 104,228 96,248 96,270 Z"
        fill="#1a1a1a"/>

  <!-- TAIL LIGHT -->
  <rect x="82" y="202" width="20" height="9"  rx="3" fill="#cc2200" opacity="0.9" filter="url(#glow2)"/>
  <rect x="84" y="204" width="16" height="5"  rx="2" fill="#ff3300" opacity="0.7"/>
  <rect x="83" y="214" width="13" height="6"  rx="2" fill="#bb6600" opacity="0.6"/>

  <!-- FRONT FORK -->
  <line x1="432" y1="174" x2="468" y2="228" stroke="#1e1e1e" stroke-width="14" stroke-linecap="round"/>
  <line x1="436" y1="174" x2="471" y2="228" stroke="#2c2c2c" stroke-width="7"  stroke-linecap="round"/>
  <line x1="455" y1="222" x2="470" y2="230" stroke="#282828" stroke-width="5"  stroke-linecap="round"/>

  <!-- FRONT FENDER -->
  <path d="M 444,238 C 440,224 443,216 452,212 L 478,210 C 487,212 490,222 487,238 Z"
        fill="#1c1c1c"/>
  <path d="M 447,218 L 481,218 L 482,222 L 447,222 Z" fill="#fd6814" opacity="0.7"/>

  <!-- HANDLEBAR STEM -->
  <rect x="414" y="135" width="11" height="36" rx="4" fill="#252525"/>
  <!-- Bar left -->
  <path d="M 418,140 C 408,137 392,133 378,130" fill="none" stroke="#2a2a2a" stroke-width="11" stroke-linecap="round"/>
  <!-- Bar right -->
  <path d="M 418,140 C 428,136 440,132 450,134" fill="none" stroke="#2a2a2a" stroke-width="11" stroke-linecap="round"/>
  <!-- Left grip -->
  <rect x="373" y="125" width="24" height="11" rx="5" fill="#333" stroke="#3c3c3c" stroke-width="1"/>
  <!-- Right grip -->
  <rect x="446" y="129" width="24" height="11" rx="5" fill="#333" stroke="#3c3c3c" stroke-width="1"/>
  <!-- Brake lever left -->
  <line x1="374" y1="130" x2="362" y2="145" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>

  <!-- MIRROR -->
  <line x1="380" y1="127" x2="364" y2="110" stroke="#222" stroke-width="3.5"/>
  <ellipse cx="359" cy="105" rx="12" ry="8"  fill="#1a1a1a" stroke="#303030" stroke-width="1.5"/>
  <ellipse cx="359" cy="105" rx="9"  ry="5.5" fill="#242424"/>
  <ellipse cx="356" cy="103" rx="3"  ry="2"   fill="#333" opacity="0.6"/>

  <!-- HEADLIGHT HOUSING (square double-LED style) -->
  <rect x="458" y="152" width="48" height="40" rx="9" fill="#181818"/>
  <rect x="461" y="155" width="42" height="34" rx="7" fill="#0c0c0c"/>
  <!-- Left LED block -->
  <rect x="464" y="158" width="17" height="14" rx="3.5" fill="#ddf4ff" opacity="0.95" class="hl" filter="url(#glow)"/>
  <!-- Right LED block -->
  <rect x="484" y="158" width="15" height="14" rx="3.5" fill="#ddf4ff" opacity="0.95" class="hl"/>
  <!-- DRL strip bottom -->
  <rect x="464" y="175" width="35" height="6"  rx="3" fill="#fd6814" opacity="0.95" filter="url(#glow2)"/>
  <!-- Ambient glow from headlight -->
  <ellipse cx="512" cy="172" rx="32" ry="22" fill="#fd6814" opacity="0.07"/>
  <!-- Side position light -->
  <rect x="503" y="163" width="6"  height="10" rx="2" fill="#fd6814" opacity="0.5"/>

</g>
</svg>
